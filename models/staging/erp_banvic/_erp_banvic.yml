
sources:
  - name: erp
    description: Esse é o sistema ERP da Banviccom dados de clientes, colaboradores, contas e transações.
    schema: erp_banvic
    tables:
      - name: localidades
        description: Tabela fonte de localidades com informação de cidade e estado.
      - name: clientes
        description: Tabela fonte de clientes com informações pessoais de cada cliente da Banvic.
      - name:  agencias
        description: Tabela fonte de agencias com informações pessoais de cada colaboradores da Banvic.
      - name:  colaboradores
        description: Tabela fonte de colaboradores com informações de cada agencia da Banvic.
