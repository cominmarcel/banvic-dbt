
sources:
  - name: erp
    description: Esse é o sistema ERP da Banviccom dados de clientes, colaboradores, contas e transações.
    schema: erp_banvic
    tables:
      - name: localidades
        description: Tabela fonte de localidades com informação de cidade e estado.
        columns:
          - name: cod_localidade
            description: Chave primaria da tabela localidades.
            data_tests:
               - unique
               - not_null
              
      - name: clientes
        description: Tabela que armazena dados dos clientes, incluindo nome, e-mail, tipo de cliente, CPF/CNPJ, data de nascimento e endereço.
        columns:
          - name: cod_cliente
            description: Chave primaria da tabela clientes.
            data_tests:
                     - unique
                     - not_null

      - name:  agencias
        description: Tabela que contem informações sobre as agencias, como nome, endereço, cidade, estado, tipo de agencia e data de abertura
        columns:
          - name: cod_agencia
            description: Chave primaria da tabela agencias
            data_tests:
               - unique
               - not_null

      - name:  colaboradores
        description: Tabela que contem dados dos colaboradores, como nome, e-mail, CPF, data de nascimento e endereço.
        columns:
          - name: cod_colaborador
            description: Chave primaria da tabela colaboradores.
            data_tests:
               - unique
               - not_null
